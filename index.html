<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <link rel="manifest" href="./manifest.json" />
  <meta name="theme-color" content="#0f172a" />
  <title>Mimo Dev Assistant</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />

  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');

    :root { --glass: rgba(15, 23, 42, 0.85); }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0a0f1c;
      color: #e2e8f0;
      font-family: 'Inter', system_ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .title-font { font-family: 'Space Grotesk', sans-serif; }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px -4px rgb(0 0 0 / 0.4);
    }

    .message-user { 
      background: linear-gradient(135deg, #3b82f6, #2563eb); 
      border-radius: 20px 20px 4px 20px; 
    }
    .message-ai { 
      background: rgba(30, 41, 59, 0.95); 
      border: 1px solid rgba(148, 163, 184, 0.25); 
      border-radius: 20px 20px 20px 4px; 
    }

    .tab-active { 
      border-bottom: 3px solid #22d3ee; 
      color: white; 
      font-weight: 600; 
    }

    .artefact-card { animation: fadeInScale 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes fadeInScale { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

    .chat-container::-webkit-scrollbar { width: 6px; }
    .chat-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 20px; }
    
    .touch-btn {
      touch-action: manipulation;
      user-select: none;
    }

    .safe-bottom {
      padding-bottom: max(0.75rem, env(safe-area-inset-bottom));
    }

    .typing-indicator {
      display: flex; gap: 4px; align-items: center; padding: 8px 0;
    }
    .typing-indicator span {
      width: 8px; height: 8px; background: #94a3b8; border-radius: 50%;
      animation: bounce 1.4s infinite ease-in-out both;
    }
    .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
    .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }
    
    @keyframes bounce {
      0%, 80%, 100% { transform: scale(0); }
      40% { transform: scale(1); }
    }

     /* Preview Modal */
    #previewModal {
      position: fixed; inset: 0; z-index: 2000;
      background: rgba(0,0,0,0.9);
      display: none; flex-direction: column;
    }
    #previewModal.active { display: flex; }
    #previewFrame {
      flex: 1; width: 100%; height: 100%; border: none; background: white;
    }
  </style>
</head>

<body class="flex flex-col h-full overflow-hidden">

  <!-- TOPBAR -->
  <header class="glass border-b border-slate-700 px-4 py-3 flex items-center justify-between z-50 flex-shrink-0">
    <div class="flex items-center gap-3">
      <div class="w-9 h-9 bg-gradient-to-br from-cyan-400 to-violet-500 rounded-2xl flex items-center justify-center text-slate-950 font-bold text-2xl">M</div>
      <h1 class="title-font text-2xl sm:text-3xl font-semibold tracking-tighter">mimo</h1>
    </div>

    <div class="flex items-center gap-2 sm:gap-3">
      <button id="indexBtn" class="touch-btn flex items-center gap-2 bg-violet-600 hover:bg-violet-500 active:bg-violet-700 px-4 sm:px-5 py-2 rounded-2xl text-sm font-medium transition-colors">
        <i class="fa-solid fa-bolt"></i> <span class="hidden sm:inline">Index</span>
      </button>
      <button id="exportZipBtn" class="touch-btn flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 px-4 sm:px-5 py-2 rounded-2xl text-sm font-medium transition-colors">
        <i class="fa-solid fa-file-export"></i>
      </button>
      <button id="settingsBtn" class="touch-btn w-10 h-10 flex items-center justify-center bg-slate-800 hover:bg-slate-700 rounded-2xl text-xl transition-colors">
        <i class="fa-solid fa-sliders"></i>
      </button>
    </div>
  </header>

  <!-- MOBILE NAV TABS -->
  <div class="lg:hidden glass border-b border-slate-700 flex text-sm font-medium flex-shrink-0 z-40">
    <button onclick="switchMainTab(0)" id="mainTab0" class="touch-btn flex-1 py-4 tab-active transition-all">Editor</button>
    <button onclick="switchMainTab(1)" id="mainTab1" class="touch-btn flex-1 py-4 transition-all">Chat</button>
    <button onclick="switchMainTab(2)" id="mainTab2" class="touch-btn flex-1 py-4 transition-all">Artefacts</button>
  </div>

  <main class="flex-1 flex overflow-hidden relative min-h-0">

    <!-- EDITOR PANEL -->
    <div id="panel-editor" class="w-full lg:w-3/5 flex flex-col border-r border-slate-700 min-h-0">
      <div class="glass border-b border-slate-700 px-4 py-3 flex justify-between items-center flex-shrink-0">
        <div class="flex items-center gap-4">
          <button onclick="toggleFilePanel()" class="lg:hidden px-4 py-2 bg-slate-800 rounded-2xl text-sm touch-btn">
            <i class="fa-solid fa-folder-open"></i>
          </button>
          <span id="fileCount" class="text-sm text-slate-400">0 files</span>
        </div>
        <button onclick="document.getElementById('zipInput').click()" 
                class="touch-btn px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm flex items-center gap-2 transition-colors">
          <i class="fa-solid fa-upload"></i> <span class="hidden sm:inline">Upload ZIP</span>
        </button>
      </div>

      <div id="filePanel" class="border-b border-slate-700 max-h-60 overflow-auto bg-slate-950 hidden lg:block flex-shrink-0">
        <div id="fileList" class="divide-y divide-slate-800"></div>
      </div>

      <div class="flex-1 relative min-h-0">
        <div id="editor" class="absolute inset-0"></div>
      </div>
    </div>

    <!-- CHAT PANEL -->
    <div id="panel-chat" class="w-full lg:w-2/5 flex flex-col hidden lg:flex min-h-0 border-l border-slate-700">
      
      <div id="chatView" class="flex-1 flex flex-col min-h-0 overflow-hidden">
        
        <div class="p-3 glass border-b border-slate-700 flex gap-3 items-center flex-shrink-0">
          <select id="modelSelect" class="flex-1 bg-slate-900 border border-slate-700 rounded-2xl px-4 py-2 text-sm appearance-none cursor-pointer">
            <option value="mimo-v2.5-pro">mimo-v2.5-pro (Vision)</option>
            <option value="mimo-v2.5">mimo-v2.5</option>
            <option value="mimo-v2-pro">mimo-v2-pro</option>
          </select>
          <label class="hidden sm:flex items-center gap-2 text-xs cursor-pointer">
            <input type="checkbox" id="showMetrics" checked class="accent-cyan-400 w-4 h-4">
            <span>Metrics</span>
          </label>
        </div>

        <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4 chat-container min-h-0 overscroll-contain"></div>

        <div class="glass border-t border-slate-700 p-3 safe-bottom flex-shrink-0">
          <div id="imagePreview" class="hidden mb-3 relative w-fit">
            <img id="previewImg" class="h-20 rounded-xl object-cover border border-slate-600">
            <button onclick="removeImage()" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center shadow-lg touch-btn">×</button>
          </div>

          <div class="flex gap-2 items-end">
            <div class="flex-1 relative">
              <textarea id="promptInput" rows="1" 
                        class="w-full bg-slate-900 border border-slate-700 focus:border-cyan-400 rounded-2xl px-4 py-3 pr-12 outline-none text-sm resize-none max-h-32 overflow-y-auto" 
                        placeholder="Ask Mimo..."></textarea>
              <div class="absolute right-2 bottom-2 flex flex-col gap-1">
                 <button onclick="triggerImageUpload()" class="touch-btn w-8 h-8 bg-slate-800 hover:bg-slate-700 rounded-xl flex items-center justify-center text-slate-400 hover:text-cyan-400 transition-colors">
                   <i class="fa-solid fa-image text-sm"></i>
                 </button>
              </div>
            </div>
            
            <div class="flex flex-col gap-2">
              <button onclick="startVoiceInput()" class="touch-btn w-11 h-11 bg-slate-800 hover:bg-slate-700 rounded-2xl flex items-center justify-center text-slate-400 transition-colors">
                <i class="fa-solid fa-microphone"></i>
              </button>
              <button id="sendBtn" class="touch-btn w-11 h-11 bg-cyan-400 hover:bg-cyan-300 active:bg-cyan-500 text-slate-950 rounded-2xl flex items-center justify-center transition-colors">
                <i class="fa-solid fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="artefactsView" class="flex-1 hidden overflow-auto p-4 bg-slate-950">
        <h3 class="text-lg font-medium mb-4 flex items-center gap-2 sticky top-0 bg-slate-950 py-2 z-10">
          <i class="fa-solid fa-cube"></i> Artefacts &amp; Previews
        </h3>
        <div id="artefactsContainer" class="space-y-6"></div>
      </div>
    </div>
  </main>

  <!-- Hidden Inputs -->
  <input id="zipInput" type="file" accept=".zip" class="hidden">
  <input id="imageInput" type="file" accept="image/*" class="hidden">

  <!-- Mobile File Drawer -->
  <div id="fileDrawer" class="hidden fixed inset-0 bg-black/70 z-50 lg:hidden" onclick="toggleFilePanel()">
    <div class="absolute bottom-0 left-0 right-0 bg-slate-900 h-4/5 rounded-t-3xl overflow-hidden flex flex-col" onclick="event.stopPropagation()">
      <div class="p-4 border-b border-slate-700 flex justify-between items-center flex-shrink-0">
        <h3 class="font-semibold text-lg">Project Files</h3>
        <button onclick="toggleFilePanel()" class="text-3xl leading-none text-slate-400 hover:text-white touch-btn p-2">×</button>
      </div>
      <div id="drawerFileList" class="overflow-auto flex-1 p-2"></div>
    </div>
  </div>

  <!-- Settings Modal -->
  <div id="settingsModal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4" onclick="document.getElementById('settingsModal').classList.add('hidden')">
    <div class="glass max-w-md w-full rounded-3xl p-6 border border-slate-600 relative" onclick="event.stopPropagation()">
      <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="absolute top-4 right-4 text-slate-400 hover:text-white text-xl touch-btn">&times;</button>
      <h2 class="text-2xl font-semibold mb-6">Settings</h2>
      <div class="space-y-5">
        <div>
          <label class="block text-sm text-slate-400 mb-2">API Key</label>
          <input id="apiKeyInput" type="password" class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-cyan-400" placeholder="sk-...">
        </div>
        <div class="flex justify-between items-center">
          <span>Save in browser</span>
          <label class="relative inline-flex items-center cursor-pointer">
            <input id="saveLocalToggle" type="checkbox" checked class="sr-only peer">
            <div class="w-11 h-6 bg-slate-700 rounded-full peer peer-checked:bg-emerald-500 after:content-[''] after:absolute after:top-0.5 after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:after:translate-x-full"></div>
          </label>
        </div>
        <button id="saveSettingsBtn" class="touch-btn w-full py-4 bg-white text-black rounded-2xl font-semibold hover:bg-slate-200 transition-colors">Save Settings</button>
      </div>
    </div>
  </div>

  <!-- Preview Modal (Fullscreen) -->
  <div id="previewModal">
    <div class="bg-slate-900 p-2 flex justify-between items-center z-10">
        <span class="text-xs text-slate-400 px-2">Live Preview</span>
        <button onclick="closePreviewModal()" class="touch-btn bg-red-500/20 text-red-400 px-4 py-1 rounded-lg text-sm font-semibold">
            <i class="fa-solid fa-xmark mr-1"></i> Close
        </button>
    </div>
    <iframe id="previewFrame" sandbox="allow-scripts allow-same-origin allow-forms allow-modals"></iframe>
  </div>

  
  <!-- SCRIPTS -->
  <script>
    let editor, currentFile = null;
    const projectFiles = {};
    let projectContext = ""; // This will hold the indexed text
    let artefacts = [];
    let attachedImage = null;
    let currentMainTab = 0;
    let saveTimeout;

    // Monaco Loader
    require.config({ paths: { vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs" } });
    require(["vs/editor/editor.main"], () => {
      editor = monaco.editor.create(document.getElementById("editor"), {
        value: "// Upload a ZIP or start chatting",
        language: "javascript",
        theme: "vs-dark",
        automaticLayout: true,
        fontSize: 14,
        minimap: { enabled: false },
        scrollBeyondLastLine: false,
        wordWrap: 'on'
      });

      editor.onDidChangeModelContent(() => {
          if (currentFile) {
              projectFiles[currentFile] = editor.getValue();
              triggerSave();
          }
      });
    });

    // --- Persistence ---
    function triggerSave() {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(saveProject, 1000);
    }

    function saveProject() {
        try {
            localStorage.setItem('mimo_project', JSON.stringify(projectFiles));
        } catch (e) {
            console.warn("Storage full", e);
        }
    }

    function loadProject() {
        const saved = localStorage.getItem('mimo_project');
        if (saved) {
            try {
                const files = JSON.parse(saved);
                if (Object.keys(files).length > 0) {
                    for (let k in files) projectFiles[k] = files[k];
                    document.getElementById("fileCount").textContent = `${Object.keys(projectFiles).length} files (Restored)`;
                    renderFileList();
                    const firstName = Object.keys(projectFiles)[0];
                    if (firstName) {
                        currentFile = firstName;
                        if(editor) editor.setValue(projectFiles[firstName]);
                    }
                }
            } catch(e) {
                localStorage.removeItem('mimo_project');
            }
        }
    }

    // Tab Switching
    function switchMainTab(tab) {
      currentMainTab = tab;
      const editorPanel = document.getElementById("panel-editor");
      const chatPanel = document.getElementById("panel-chat");
      
      if (window.innerWidth >= 1024) {
        editorPanel.classList.remove('hidden');
        chatPanel.classList.remove('hidden');
      } else {
        editorPanel.classList.toggle('hidden', tab !== 0);
        chatPanel.classList.toggle('hidden', tab === 0);
        if (tab === 2) { switchChatTab(1); chatPanel.classList.remove('hidden'); } 
        else if (tab === 1) { switchChatTab(0); chatPanel.classList.remove('hidden'); }
      }

      for (let i = 0; i < 3; i++) {
        const el = document.getElementById(`mainTab${i}`);
        if (el) el.classList.toggle("tab-active", i === tab);
      }
    }

    function switchChatTab(tab) {
      document.getElementById("chatView").classList.toggle("hidden", tab !== 0);
      document.getElementById("artefactsView").classList.toggle("hidden", tab !== 1);
    }

    // Message Logic
    function addMessage(role, content, metadata = null, isThinking = false) {
      const container = document.getElementById("chatMessages");
      const div = document.createElement("div");
      div.className = `flex ${role === "user" ? "justify-end" : "justify-start"} items-end gap-2`;
      
      let html = `<div class="${role === "user" ? "message-user" : "message-ai"} max-w-[90%] sm:max-w-[85%] px-4 py-2.5 text-sm sm:text-base">`;
      
      if (role === "user" && attachedImage) {
        html += `<img src="${attachedImage}" class="mb-2 max-h-32 rounded-lg">`;
      }
      
      if (isThinking) {
          html += `<div class="typing-indicator"><span></span><span></span><span></span></div>`;
          div.setAttribute('id', 'thinking-msg');
      } else {
          html += `<div class="whitespace-pre-wrap break-words">${escapeHtml(content)}</div>`;
      }

      // Only show metadata if it exists (fix for 'undefinedms')
      if (metadata && document.getElementById("showMetrics").checked) {
        const lat = metadata.latency ? `${metadata.latency}ms` : '';
        const tok = metadata.tokens ? `${metadata.tokens} tok` : '? tok';
        html += `<div class="text-[10px] mt-2 pt-2 border-t border-slate-600/30 font-mono flex justify-between text-slate-400 opacity-70">
          <span>${metadata.model}</span><span>${lat}</span><span>${tok}</span>
        </div>`;
      }
      html += `</div>`;
      div.innerHTML = html;
      container.appendChild(div);
      
      setTimeout(() => {
        container.scrollTo({ top: container.scrollHeight, behavior: "smooth" });
      }, 50);
      
      return div;
    }

    function removeThinking() {
        const el = document.getElementById('thinking-msg');
        if (el) el.remove();
    }

    function escapeHtml(text) {
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    function renderArtefacts() {
      const container = document.getElementById("artefactsContainer");
      container.innerHTML = artefacts.length === 0 ? 
        `<p class="text-center text-slate-500 py-20">No artefacts yet.</p>` : "";

      const artefactTabBtn = document.getElementById('mainTab2');
      if (artefactTabBtn && artefacts.length > 0) {
          artefactTabBtn.innerHTML = `Artefacts (${artefacts.length})`;
      }

      artefacts.forEach((artefact, i) => {
        const div = document.createElement("div");
        div.className = "artefact-card bg-slate-900 border border-slate-700 rounded-2xl overflow-hidden";
        if (artefact.type === "image") {
          div.innerHTML = `<img src="${artefact.url}" class="w-full h-64 object-cover"><div class="p-4 text-xs font-mono opacity-70">${artefact.name}</div>`;
        } else if (artefact.type === "code") {
          const lang = artefacts[i].lang || 'html';
          div.innerHTML = `
            <div class="p-3 bg-slate-950 border-b border-slate-700 text-xs text-cyan-400 font-mono flex justify-between items-center">
              <span>Code Snippet (${lang})</span>
              <div class="flex gap-2">
                <button onclick="copyArtefact(${i})" class="touch-btn bg-slate-700/50 hover:bg-slate-600 text-slate-300 px-2 py-1 rounded"><i class="fa-regular fa-copy"></i></button>
                <button onclick="previewCode(${i})" class="touch-btn bg-cyan-400/10 hover:bg-cyan-400/20 text-cyan-400 px-3 py-1 rounded-lg"><i class="fa-solid fa-play mr-1"></i> Preview</button>
              </div>
            </div>
            <pre class="p-4 text-xs overflow-auto max-h-60 font-mono bg-slate-950/50">${escapeHtml(artefact.content)}</pre>`;
        }
        container.appendChild(div);
      });
    }

    window.copyArtefact = function(i) {
        const a = artefacts[i];
        if (a) navigator.clipboard.writeText(a.content);
    }

    window.previewCode = function(i) {
      const a = artefacts[i];
      if (a && a.type === "code") {
        const modal = document.getElementById('previewModal');
        const frame = document.getElementById('previewFrame');
        const doc = frame.contentDocument || frame.contentWindow.document;
        doc.open();
        doc.write(a.content);
        doc.close();
        modal.classList.add('active');
      }
    };

    window.closePreviewModal = function() {
        document.getElementById('previewModal').classList.remove('active');
    }

    // Image & Voice
    function triggerImageUpload() { document.getElementById("imageInput").click(); }
    
    document.getElementById("imageInput").addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        attachedImage = ev.target.result;
        document.getElementById("previewImg").src = attachedImage;
        document.getElementById("imagePreview").classList.remove("hidden");
      };
      reader.readAsDataURL(file);
      e.target.value = ''; 
    });

    function removeImage() {
      attachedImage = null;
      document.getElementById("imagePreview").classList.add("hidden");
    }

    function startVoiceInput() {
      const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Speech) return alert("Voice not supported");
      const rec = new Speech();
      rec.lang = "en-US";
      rec.onresult = e => {
          document.getElementById("promptInput").value = e.results[0][0].transcript;
          document.getElementById("promptInput").focus();
      };
      rec.start();
    }

    // Send Message
    document.getElementById("sendBtn").onclick = async () => {
      const prompt = document.getElementById("promptInput").value.trim();
      if (!prompt && !attachedImage) return;

      const model = document.getElementById("modelSelect").value;
      
      addMessage("user", prompt || "[Image]", { model });
      document.getElementById("promptInput").value = "";
      removeImage(); 

      const apiKey = localStorage.getItem("mimo_api_key");
      if (!apiKey) return addMessage("ai", "Missing API Key. Click Settings.");

      const start = Date.now();
      document.getElementById("sendBtn").disabled = true;
      document.getElementById("sendBtn").innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

      addMessage("ai", "", null, true);

      try {
        let messages = [{ role: "user", content: prompt || "Describe this image" }];
        
        // System Prompt Construction
        let systemContent = "You are Mimo, a helpful dev assistant. When asked to create code, output it in a markdown code block.";
        
        // *** FIX: Inject Context ***
        if (projectContext) {
            systemContent += "\n\n--- PROJECT CONTEXT ---\nThe user has uploaded the following project files. Use this context to answer questions.\n" + projectContext;
        }

        const systemPrompt = { role: "system", content: systemContent };

        if (attachedImage) {
          messages[0].content = [
            { type: "text", text: prompt || "Help with this image" },
            { type: "image_url", image_url: { url: attachedImage } }
          ];
        }

        const res = await fetch("https://token-plan-ams.xiaomimimo.com/v1/chat/completions", {
          method: "POST",
          headers: { "Content-Type": "application/json", "Authorization": `Bearer ${apiKey}` },
          body: JSON.stringify({ model, messages: [systemPrompt, ...messages], temperature: 0.4 })
        });

        if (!res.ok) throw new Error(`API Error: ${res.status}`);
        
        const data = await res.json();
        const text = data.choices?.[0]?.message?.content || "No response";

        removeThinking();

        let cleanText = text;
        const codeBlockRegex = /```(\w+)?\n([\s\S]*?)```/g;
        let match;
        
        while ((match = codeBlockRegex.exec(text)) !== null) {
            const lang = match[1] || 'code';
            const code = match[2];
            artefacts.unshift({ type: "code", content: code.trim(), lang: lang });
            cleanText = cleanText.replace(match[0], ""); 
        }

        if (cleanText.trim() === "" && artefacts.length > 0) {
            cleanText = "Here is the code I generated for you.";
        }

        addMessage("ai", cleanText.trim(), { model, latency: Date.now() - start, tokens: data.usage?.total_tokens });
        renderArtefacts();

      } catch (e) {
        removeThinking();
        addMessage("ai", "Error: " + e.message);
      } finally {
        document.getElementById("sendBtn").disabled = false;
        document.getElementById("sendBtn").innerHTML = '<i class="fa-solid fa-paper-plane"></i>';
      }
    };

    // ZIP & Files Logic
    document.getElementById("zipInput").addEventListener("change", async e => {
      const file = e.target.files[0];
      if (!file) return;
      const zip = await JSZip.loadAsync(file);
      
      for (const key in projectFiles) delete projectFiles[key];
      
      for (const name in zip.files) {
        if (zip.files[name].dir) continue;
        projectFiles[name] = await zip.files[name].async("string");
      }
      
      document.getElementById("fileCount").textContent = `${Object.keys(projectFiles).length} files`;
      renderFileList();
      addMessage("ai", `Loaded ${Object.keys(projectFiles).length} files. Click "Index" to make me aware of their contents.`);
      
      saveProject();
      e.target.value = '';
    });

    function renderFileList() {
      ["fileList", "drawerFileList"].forEach(id => {
        const el = document.getElementById(id);
        el.innerHTML = "";
        Object.keys(projectFiles).forEach(name => {
          const btn = document.createElement("button");
          btn.className = `w-full px-4 py-3 text-left hover:bg-slate-800 active:bg-slate-700 flex items-center gap-3 text-sm truncate ${currentFile === name ? 'bg-slate-800 text-cyan-400' : ''}`;
          btn.innerHTML = `<i class="fa-solid fa-file-code w-4 text-center opacity-60"></i><span class="truncate">${name.split('/').pop()}</span>`;
          btn.onclick = () => {
            currentFile = name;
            editor.setValue(projectFiles[name]);
            monaco.editor.setModelLanguage(editor.getModel(), getLang(name));
            if (window.innerWidth < 1024) {
              toggleFilePanel(); 
              switchMainTab(0); 
            }
            renderFileList();
          };
          el.appendChild(btn);
        });
      });
    }

    function getLang(filename) {
      if (filename.endsWith('.html')) return 'html';
      if (filename.endsWith('.css')) return 'css';
      if (filename.endsWith('.json')) return 'json';
      return 'javascript';
    }

    document.getElementById("indexBtn").onclick = () => {
      let ctx = "";
      const entries = Object.entries(projectFiles);
      if (entries.length === 0) return addMessage("ai", "No files to index. Upload a ZIP.");
      
      entries.slice(0, 40).forEach(([n, c]) => ctx += `FILE: ${n}\n${c.slice(0, 2000)}\n---\n`); // Increased slice for better context
      projectContext = ctx;
      
      // Save context to localStorage so it persists
      try {
          localStorage.setItem('mimo_project_context', ctx);
      } catch(e) {}
      
      addMessage("ai", `Indexed ${entries.length} files. I am now aware of the project structure and content.`);
    };

    document.getElementById("exportZipBtn").onclick = async () => {
      if (currentFile && editor) projectFiles[currentFile] = editor.getValue();
      const zip = new JSZip();
      Object.entries(projectFiles).forEach(([n, c]) => zip.file(n, c));
      const blob = await zip.generateAsync({ type: "blob" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = "mimo_project.zip";
      a.click();
      addMessage("ai", "Project exported.");
    };

    document.getElementById("settingsBtn").onclick = () => document.getElementById("settingsModal").classList.remove("hidden");
    document.getElementById("saveSettingsBtn").onclick = () => {
      const key = document.getElementById("apiKeyInput").value.trim();
      if (key) localStorage.setItem("mimo_api_key", key);
      alert("Settings Saved");
      document.getElementById("settingsModal").classList.add("hidden");
    };

    function toggleFilePanel() {
      document.getElementById("fileDrawer").classList.toggle("hidden");
    }

    const txt = document.getElementById("promptInput");
    txt.addEventListener("input", () => {
      txt.style.height = 'auto';
      txt.style.height = (txt.scrollHeight) + 'px';
    });
    
    txt.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { 
        e.preventDefault(); 
        document.getElementById("sendBtn").click(); 
      }
    });

    // Init
    window.onload = () => {
      if (localStorage.getItem("mimo_api_key")) {
        document.getElementById("apiKeyInput").value = localStorage.getItem("mimo_api_key");
      }
      
      // Restore context
      const savedCtx = localStorage.getItem('mimo_project_context');
      if (savedCtx) projectContext = savedCtx;
      
      if (window.innerWidth < 1024) {
        switchMainTab(0); 
      }
      
      loadProject();
      
      setTimeout(() => {
        addMessage("ai", "Welcome back! I've restored your last session. What would you like to build?");
      }, 300);
    };

    window.addEventListener('resize', () => {
      switchMainTab(currentMainTab);
    });
    
  </script>
  <script src="./debugger.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="theme-color" content="#0f172a" />
  <title>Mimo Dev Assistant</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs/loader.min.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css" />
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Space+Grotesk:wght@500;600&display=swap');

    :root { --glass: rgba(15, 23, 42, 0.85); }

    html, body {
      height: 100%;
      overflow: hidden;
      background: #0a0f1c;
      color: #e2e8f0;
      font-family: 'Inter', system_ui, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    .title-font { font-family: 'Space Grotesk', sans-serif; }

    .glass {
      background: var(--glass);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      box-shadow: 0 8px 32px -4px rgb(0 0 0 / 0.4);
    }

    .message-user { 
      background: linear-gradient(135deg, #3b82f6, #2563eb); 
      border-radius: 20px 20px 4px 20px; 
    }
    .message-ai { 
      background: rgba(30, 41, 59, 0.95); 
      border: 1px solid rgba(148, 163, 184, 0.25); 
      border-radius: 20px 20px 20px 4px; 
    }

    .tab-active { border-bottom: 3px solid #22d3ee; color: white; font-weight: 600; }

    .artefact-card { animation: fadeInScale 0.4s cubic-bezier(0.34, 1.56, 0.64, 1); }
    @keyframes fadeInScale { from { opacity: 0; transform: scale(0.92); } to { opacity: 1; transform: scale(1); } }

    .chat-container::-webkit-scrollbar { width: 6px; }
    .chat-container::-webkit-scrollbar-thumb { background: #475569; border-radius: 20px; }
    
    .touch-btn { touch-action: manipulation; user-select: none; }
    .safe-bottom { padding-bottom: max(0.75rem, env(safe-area-inset-bottom)); }

    /* Project Dropdown */
    .dropdown-menu {
      position: absolute; top: 100%; left: 0; right: auto;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 12px; margin-top: 8px; z-index: 60;
      box-shadow: 0 10px 25px rgba(0,0,0,0.5); display: none;
      min-width: 250px;
    }
    .dropdown-menu.show { display: block; }

  </style>
</head>

<body class="flex flex-col h-full overflow-hidden">

  <!-- TOPBAR -->
  <header class="glass border-b border-slate-700 px-4 py-3 flex items-center justify-between z-50 flex-shrink-0">
    
    <!-- Project Manager (Left) -->
    <div class="relative">
      <button id="projectToggle" class="flex items-center gap-2 bg-slate-800 hover:bg-slate-700 px-3 py-2 rounded-xl text-sm font-medium transition-colors">
        <i class="fa-solid fa-folder-tree text-cyan-400"></i>
        <span id="currentProjectName" class="max-w-[100px] truncate">New Project</span>
        <i class="fa-solid fa-chevron-down text-xs opacity-50"></i>
      </button>
      
      <div id="projectDropdown" class="dropdown-menu glass">
        <div class="p-2 border-b border-slate-700 text-xs text-slate-400 uppercase">Projects</div>
        <div id="projectListContainer" class="max-h-60 overflow-auto"></div>
        <div class="p-2 border-t border-slate-700">
          <button onclick="createNewProject()" class="w-full text-left px-3 py-2 rounded-lg hover:bg-slate-700 text-sm text-emerald-400 flex items-center gap-2">
            <i class="fa-solid fa-plus"></i> New Project
          </button>
        </div>
      </div>
    </div>

    <!-- Logo -->
    <div class="flex items-center gap-3 absolute left-1/2 transform -translate-x-1/2">
       <div class="w-8 h-8 bg-gradient-to-br from-cyan-400 to-violet-500 rounded-xl flex items-center justify-center text-slate-950 font-bold text-xl">M</div>
       <h1 class="title-font text-xl font-semibold tracking-tighter hidden sm:block">mimo</h1>
    </div>

    <!-- Actions (Right) -->
    <div class="flex items-center gap-2">
      <button id="indexBtn" class="touch-btn flex items-center gap-2 bg-violet-600 hover:bg-violet-500 active:bg-violet-700 px-4 py-2 rounded-2xl text-sm font-medium transition-colors">
        <i class="fa-solid fa-bolt"></i> <span class="hidden sm:inline">Index</span>
      </button>
      <button id="exportZipBtn" class="touch-btn flex items-center gap-2 bg-emerald-600 hover:bg-emerald-500 active:bg-emerald-700 px-4 py-2 rounded-2xl text-sm font-medium transition-colors">
        <i class="fa-solid fa-file-export"></i>
      </button>
      <button id="settingsBtn" class="touch-btn w-10 h-10 flex items-center justify-center bg-slate-800 hover:bg-slate-700 rounded-2xl text-xl transition-colors">
        <i class="fa-solid fa-sliders"></i>
      </button>
    </div>
  </header>

  <!-- MOBILE NAV TABS -->
  <div class="lg:hidden glass border-b border-slate-700 flex text-sm font-medium flex-shrink-0 z-40">
    <button onclick="switchMainTab(0)" id="mainTab0" class="touch-btn flex-1 py-4 tab-active transition-all">Editor</button>
    <button onclick="switchMainTab(1)" id="mainTab1" class="touch-btn flex-1 py-4 transition-all">Chat</button>
    <button onclick="switchMainTab(2)" id="mainTab2" class="touch-btn flex-1 py-4 transition-all">Artefacts</button>
  </div>

  <main class="flex-1 flex overflow-hidden relative min-h-0">

    <!-- EDITOR PANEL -->
    <div id="panel-editor" class="w-full lg:w-3/5 flex flex-col border-r border-slate-700 min-h-0">
      <div class="glass border-b border-slate-700 px-4 py-3 flex justify-between items-center flex-shrink-0">
        <div class="flex items-center gap-4">
          <button onclick="toggleFilePanel()" class="lg:hidden px-4 py-2 bg-slate-800 rounded-2xl text-sm touch-btn">
            <i class="fa-solid fa-folder-open"></i>
          </button>
          <span id="fileCount" class="text-sm text-slate-400">0 files</span>
        </div>
        <button onclick="document.getElementById('zipInput').click()" 
                class="touch-btn px-4 py-2 bg-slate-800 hover:bg-slate-700 rounded-2xl text-sm flex items-center gap-2 transition-colors">
          <i class="fa-solid fa-upload"></i> <span class="hidden sm:inline">Upload ZIP</span>
        </button>
      </div>

      <div id="filePanel" class="border-b border-slate-700 max-h-60 overflow-auto bg-slate-950 hidden lg:block flex-shrink-0">
        <div id="fileList" class="divide-y divide-slate-800"></div>
      </div>

      <div class="flex-1 relative min-h-0">
        <div id="editor" class="absolute inset-0"></div>
      </div>
    </div>

    <!-- CHAT PANEL -->
    <div id="panel-chat" class="w-full lg:w-2/5 flex flex-col hidden lg:flex min-h-0 border-l border-slate-700">
      
      <div id="chatView" class="flex-1 flex flex-col min-h-0 overflow-hidden">
        
                <div class="p-3 glass border-b border-slate-700 flex gap-3 items-center flex-shrink-0">
          <select id="modelSelect" class="flex-1 bg-slate-900 border border-slate-700 rounded-2xl px-4 py-2 text-sm appearance-none cursor-pointer">
            <!-- Correct Model IDs from Xiaomi Docs -->
            <option value="mimo-v2.5-pro">mimo-v2.5-pro</option>
            <option value="mimo-v2.5">mimo-v2.5</option>
            <option value="mimo-v2-pro">mimo-v2-pro</option>
           <option value="mimo-v2-omni">mimo-v2-omni</option>
          </select>
          <label class="hidden sm:flex items-center gap-2 text-xs cursor-pointer">
            <input type="checkbox" id="showMetrics" checked class="accent-cyan-400 w-4 h-4">
            <span>Metrics</span>
          </label>
        </div>

        <div id="chatMessages" class="flex-1 overflow-y-auto p-4 space-y-4 chat-container min-h-0 overscroll-contain"></div>

        <div class="glass border-t border-slate-700 p-3 safe-bottom flex-shrink-0">
          <div id="imagePreview" class="hidden mb-3 relative w-fit">
            <img id="previewImg" class="h-20 rounded-xl object-cover border border-slate-600">
            <button onclick="removeImage()" class="absolute -top-2 -right-2 bg-red-500 text-white w-6 h-6 rounded-full text-xs flex items-center justify-center shadow-lg touch-btn">×</button>
          </div>

          <div class="flex gap-2 items-end">
            <div class="flex-1 relative">
              <textarea id="promptInput" rows="1" 
                        class="w-full bg-slate-900 border border-slate-700 focus:border-cyan-400 rounded-2xl px-4 py-3 pr-12 outline-none text-sm resize-none max-h-32 overflow-y-auto" 
                        placeholder="Ask Mimo..."></textarea>
              <div class="absolute right-2 bottom-2 flex flex-col gap-1">
                 <!-- Image Upload for Multimodal -->
                 <button onclick="triggerImageUpload()" class="touch-btn w-8 h-8 bg-slate-800 hover:bg-slate-700 rounded-xl flex items-center justify-center text-slate-400 hover:text-cyan-400 transition-colors" title="Upload Image for Vision">
                   <i class="fa-solid fa-image text-sm"></i>
                 </button>
              </div>
            </div>
            
            <div class="flex flex-col gap-2">
              <button onclick="startVoiceInput()" class="touch-btn w-11 h-11 bg-slate-800 hover:bg-slate-700 rounded-2xl flex items-center justify-center text-slate-400 transition-colors">
                <i class="fa-solid fa-microphone"></i>
              </button>
              <button id="sendBtn" class="touch-btn w-11 h-11 bg-cyan-400 hover:bg-cyan-300 active:bg-cyan-500 text-slate-950 rounded-2xl flex items-center justify-center transition-colors">
                <i class="fa-solid fa-paper-plane"></i>
              </button>
            </div>
          </div>
        </div>
      </div>

      <div id="artefactsView" class="flex-1 hidden overflow-auto p-4 bg-slate-950">
        <h3 class="text-lg font-medium mb-4 flex items-center gap-2 sticky top-0 bg-slate-950 py-2 z-10">
          <i class="fa-solid fa-cube"></i> Artefacts
        </h3>
        <div id="artefactsContainer" class="space-y-6"></div>
      </div>
    </div>
  </main>

  <!-- Hidden Inputs -->
  <input id="zipInput" type="file" accept=".zip" class="hidden">
  <input id="imageInput" type="file" accept="image/*" class="hidden">

  <!-- Mobile File Drawer -->
  <div id="fileDrawer" class="hidden fixed inset-0 bg-black/70 z-50 lg:hidden" onclick="toggleFilePanel()">
    <div class="absolute bottom-0 left-0 right-0 bg-slate-900 h-4/5 rounded-t-3xl overflow-hidden flex flex-col" onclick="event.stopPropagation()">
      <div class="p-4 border-b border-slate-700 flex justify-between items-center flex-shrink-0">
        <h3 class="font-semibold text-lg">Project Files</h3>
        <button onclick="toggleFilePanel()" class="text-3xl leading-none text-slate-400 hover:text-white touch-btn p-2">×</button>
      </div>
      <div id="drawerFileList" class="overflow-auto flex-1 p-2"></div>
    </div>
  </div>

    <!-- Settings Modal -->
  <div id="settingsModal" class="hidden fixed inset-0 bg-black/70 z-[100] flex items-center justify-center p-4" onclick="this.classList.add('hidden')">
    <div class="glass max-w-md w-full rounded-3xl p-6 border border-slate-600 relative" onclick="event.stopPropagation()">
      <button onclick="document.getElementById('settingsModal').classList.add('hidden')" class="absolute top-4 right-4 text-slate-400 hover:text-white text-xl touch-btn">&times;</button>
      <h2 class="text-2xl font-semibold mb-6">Settings</h2>
      <div class="space-y-5">
        <div>
          <label class="block text-sm text-slate-400 mb-2">API Key</label>
          <input id="apiKeyInput" type="password" class="w-full bg-slate-950 border border-slate-700 rounded-2xl px-5 py-4 focus:outline-none focus:border-cyan-400" placeholder="sk-...">
        </div>
        
        <!-- Fetch Models Button -->
        <div class="flex gap-2">
             <button onclick="fetchAvailableModels(event)" class="flex-1 py-3 bg-slate-700 hover:bg-slate-600 text-white rounded-xl font-medium text-sm transition-colors flex items-center justify-center gap-2">
                <i class="fa-solid fa-rotate"></i> Fetch Models
            </button>
        </div>
        <p class="text-xs text-slate-500 -mt-2">Click to auto-detect available models for your key.</p>

        <button id="saveSettingsBtn" class="touch-btn w-full py-4 bg-white text-black rounded-2xl font-semibold hover:bg-slate-200 transition-colors">Save Settings</button>
      </div>
    </div>
  </div>

  <script>
    // --- STATE MANAGEMENT ---
    let editor, currentFile = null;
    let attachedImage = null;
    let currentMainTab = 0;
    let saveTimeout;
    
    // Database Structure in LocalStorage:
    // 'mimo_db': { activeId: 'uuid', projects: { 'uuid': { name, files:{}, context:'', messages:[] } } }
    let db = {
        activeId: null,
        projects: {}
    };

    // --- INIT MONACO ---
    require.config({
    paths: {
        vs: "https://cdn.jsdelivr.net/npm/monaco-editor@0.52.2/min/vs"
    }
});

require(["vs/editor/editor.main"], () => {

    editor = monaco.editor.create(
        document.getElementById("editor"),
        {
            value: "// Select or Create a Project",
            language: "javascript",
            theme: "vs-dark",
            automaticLayout: true,
            fontSize: 14,
            minimap: { enabled: false },
            scrollBeyondLastLine: false,
            wordWrap: 'on'
        }
    );

    loadSavedModels();

    editor.onDidChangeModelContent(() => {
        if (currentFile && getActiveProject()) {
            getActiveProject().files[currentFile] = editor.getValue();
            triggerSave();
        }
    });

    initApp();
});

    // --- DATABASE & PROJECT CRUD ---
    function loadDB() {
        const saved = localStorage.getItem('mimo_db');
        if (saved) {
            try {
                const parsed = JSON.parse(saved);
                db = parsed;
                return;
            } catch(e) { console.error("Corrupted DB", e); }
        } 
        // Create default project if none exists
        createNewProject("New Project", true);
    }

    function saveDB() {
        try {
            localStorage.setItem('mimo_db', JSON.stringify(db));
        } catch(e) {
            alert("Storage Full! Please export and delete some projects.");
        }
    }

    function getActiveProject() {
        return db.projects[db.activeId];
    }

    function createNewProject(name = "Untitled", isInit = false) {
        const id = 'p_' + Date.now();
        const proj = {
            id: id,
            name: name,
            files: {},
            context: "",
            messages: [], // Chat History
            artefacts: []
        };
        db.projects[id] = proj;
        db.activeId = id;
        saveDB();
        if (!isInit) {
            switchProject(id);
            renderProjectDropdown();
        }
        return proj;
    }

    function switchProject(id) {
        if (!db.projects[id]) return;
        db.activeId = id;
        saveDB();
        
        // Reset UI
        currentFile = null;
        attachedImage = null;
        
        // Load Files
        renderFileList();
        const proj = getActiveProject();
        const firstFile = Object.keys(proj.files)[0];
        if (firstFile) {
            currentFile = firstFile;
            editor.setValue(proj.files[firstFile]);
        } else {
            editor.setValue("// Empty Project");
        }
        
        // Load Chat
        renderChatHistory();
        renderArtefacts();
        
        // Update Header
        document.getElementById('currentProjectName').textContent = proj.name;
        closeDropdowns();
    }

    function deleteProject(id) {
        if (Object.keys(db.projects).length <= 1) return alert("Cannot delete the last project.");
        if (confirm("Delete this project and all its files?")) {
            delete db.projects[id];
            if (db.activeId === id) {
                db.activeId = Object.keys(db.projects)[0];
            }
            saveDB();
            switchProject(db.activeId);
            renderProjectDropdown();
        }
    }

    function renderProjectDropdown() {
        const container = document.getElementById('projectListContainer');
        container.innerHTML = '';
        
        Object.values(db.projects).forEach(p => {
            const isActive = p.id === db.activeId;
            const div = document.createElement('div');
            div.className = `flex items-center justify-between px-3 py-2 rounded-lg m-1 ${isActive ? 'bg-cyan-500/20 text-cyan-400' : 'hover:bg-slate-700'}`;
            div.innerHTML = `
                <span class="truncate text-sm cursor-pointer flex-1" onclick="switchProject('${p.id}')">${p.name}</span>
                <div class="flex gap-2 items-center">
                    <button onclick="event.stopPropagation(); renameProject('${p.id}')" class="text-slate-500 hover:text-white text-xs"><i class="fa-solid fa-pen"></i></button>
                    <button onclick="event.stopPropagation(); deleteProject('${p.id}')" class="text-red-500 hover:text-red-300 text-xs"><i class="fa-solid fa-trash"></i></button>
                </div>
            `;
            container.appendChild(div);
        });
    }

    function renameProject(id) {
        const newName = prompt("Enter new project name:", db.projects[id].name);
        if (newName) {
            db.projects[id].name = newName;
            saveDB();
            renderProjectDropdown();
            if (id === db.activeId) document.getElementById('currentProjectName').textContent = newName;
        }
    }

    function triggerSave() {
        clearTimeout(saveTimeout);
        saveTimeout = setTimeout(saveDB, 1000);
    }
    // --- MODEL LOADER ---
    
    async function fetchAvailableModels(ev) {
        const apiKey = document.getElementById("apiKeyInput").value.trim();
        if (!apiKey) return alert("Please enter an API Key first.");

        const btn = event.target.closest('button');
        const originalContent = btn.innerHTML;
        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Loading...';
        btn.disabled = true;

        try {
            // Standard OpenAI endpoint to list models
            const res = await fetch("https://token-plan-ams.xiaomimimo.com/v1/models", {
                method: "GET",
                headers: { "Authorization": `Bearer ${apiKey}` }
            });

            if (!res.ok) {
                const err = await res.json().catch(() => ({}));
                throw new Error(err.error?.message || `Status ${res.status}`);
            }

            const data = await res.json();
            const models = data.data || [];

            if (models.length === 0) throw new Error("No models found for this key.");

            // Populate the Select Dropdown
            const select = document.getElementById("modelSelect");
            select.innerHTML = ''; // Clear existing

            // Sort models (newest first usually) or alphabetically
            models.sort((a, b) => (a.id < b.id ? -1 : 1));

            models.forEach(m => {
                const opt = document.createElement("option");
                opt.value = m.id;
                opt.textContent = m.id;
                select.appendChild(opt);
            });

            // Save preferences
            localStorage.setItem("mimo_api_key", apiKey);
            localStorage.setItem("mimo_available_models", JSON.stringify(models.map(m => m.id)));
            
            alert(`Success! Loaded ${models.length} models.`);
            document.getElementById("settingsModal").classList.add("hidden");

        } catch (e) {
            alert("Failed to fetch models: " + e.message);
        } finally {
            btn.innerHTML = originalContent;
            btn.disabled = false;
        }
    }

    // Call this on startup to load saved models into the dropdown
    function loadSavedModels() {
        const saved = localStorage.getItem("mimo_available_models");
        if (saved) {
            try {
                const models = JSON.parse(saved);
                const select = document.getElementById("modelSelect");
                select.innerHTML = '';
                models.forEach(id => {
                    const opt = document.createElement("option");
                    opt.value = id;
                    opt.textContent = id;
                    select.appendChild(opt);
                });
            } catch(e) {}
        }
    }

    
    // --- CHAT LOGIC (Streaming) ---
    function renderChatHistory() {
        const container = document.getElementById("chatMessages");
        container.innerHTML = ''; // Clear current
        const proj = getActiveProject();
        if (!proj) return;

        proj.messages.forEach(msg => {
            // We don't re-render the thinking indicator or stream, just final messages
            if (msg.role === 'user' || msg.role === 'assistant') {
                appendMessageDOM(msg.role, msg.content, msg.metadata, false);
            }
        });
        
        setTimeout(() => container.scrollTo({ top: container.scrollHeight, behavior: "smooth" }), 50);
    }

    // Helper to just add DOM elements (used by history loader and live stream)
    function appendMessageDOM(role, content, metadata = null, scroll = true) {
        const container = document.getElementById("chatMessages");
        const div = document.createElement("div");
        div.className = `flex ${role === "user" ? "justify-end" : "justify-start"} items-end gap-2`;
        
        // Basic HTML construction
        let html = `<div class="${role === "user" ? "message-user" : "message-ai"} max-w-[90%] sm:max-w-[85%] px-4 py-2.5 text-sm sm:text-base">`;
        
        // Handle images for User messages
        if (role === 'user' && content.image) {
             html += `<img src="${content.image}" class="mb-2 max-h-32 rounded-lg">`;
             if (!content.text) { html += `<div class="text-xs opacity-70">Image attached</div>`; }
        }
        
        const textContent = (typeof content === 'string') ? content : content.text;
        html += `<div class="whitespace-pre-wrap break-words">${escapeHtml(textContent || "")}</div>`;

        if (metadata && document.getElementById("showMetrics").checked) {
            const lat = metadata.latency ? `${metadata.latency}ms` : '';
            const tok = metadata.tokens ? `${metadata.tokens} tok` : '';
            html += `<div class="text-[10px] mt-2 pt-2 border-t border-slate-600/30 font-mono flex justify-between text-slate-400 opacity-70">
              <span>${metadata.model}</span><span>${lat}</span><span>${tok}</span>
            </div>`;
        }
        html += `</div>`;
        div.innerHTML = html;
        container.appendChild(div);
        
        if (scroll) container.scrollTo({ top: container.scrollHeight, behavior: "smooth" });
        return div;
    }

    // STREAMING IMPLEMENTATION
    async function sendChat() {
        const promptEl = document.getElementById("promptInput");
        const prompt = promptEl.value.trim();
        if (!prompt && !attachedImage) return;

        const model = document.getElementById("modelSelect").value;
        const proj = getActiveProject();
        if (!proj) return;

        // 1. Construct User Message Object
        const userMessage = { role: "user", content: { text: prompt, image: attachedImage } };
        
        // Save User Message immediately
        proj.messages.push(userMessage);
        saveDB();
        
        // Render User Message
        appendMessageDOM('user', userMessage.content);
        
        promptEl.value = "";
        removeImage();
        document.getElementById("sendBtn").disabled = true;
        document.getElementById("sendBtn").innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i>';

        // 2. Prepare API Payload
        const apiKey = localStorage.getItem("mimo_api_key");
        if (!apiKey) return alert("Add API Key in Settings.");

        const start = Date.now();
        
        // System Prompt 
      let systemContent = `You are Mimo, a helpful AI coding assistant. 

IMPORTANT RULES:
- Always confirm before taking action. Say what you plan to do first.
- When creating files or code, explain what you're building.
- Keep responses clear and concise.
- When writing code, use proper markdown code blocks with language tags.
- For HTML/CSS/JS projects, create complete, working code.`;

    if (proj.context) systemContent += "\n\nPROJECT FILES:\n" + proj.context;

    const history = proj.messages.slice(-10).map(m => {
        if (m.role === 'user') {
            if (m.content.image) return { 
                role: 'user', 
                content: [
                    { type: 'text', text: m.content.text || "Image" },
                    { type: 'image_url', image_url: { url: m.content.image } }
                ] 
            };
            return { role: 'user', content: m.content.text || "" };
        }
        return { role: 'assistant', content: m.content };
    });

    try {
        const res = await fetch("https://token-plan-ams.xiaomimimo.com/v1/chat/completions", {
            method: "POST",
            headers: {
  "Content-Type": "application/json",
  "Authorization": `Bearer ${apiKey}`
},
            body: JSON.stringify({ 
                model, 
                messages: [
                    { role: "system", content: systemContent },
                    ...history
                ], 
                stream: true,
                temperature: 0.5,
                max_completion_tokens: 2048
            })
        });

        if (!res.ok) throw new Error(`API Error ${res.status}`);

 

            // 3. Handle Stream
            const reader = res.body.getReader();
            const decoder = new TextDecoder();
            
            // Add empty AI message to DOM to fill
            const aiMsgObj = { role: 'assistant', content: '', metadata: { model, latency: 0 } };
            const msgDom = appendMessageDOM(
    'assistant',
    '',
    {
        model,
        latency: 0,
        tokens: 0
    }
);
            
            let fullContent = "";
            let buffer = "";

            while (true) {
                const { done, value } = await reader.read();
                if (done) break;
                
                buffer += decoder.decode(value, { stream: true });
                const lines = buffer.split("\n");
                buffer = lines.pop(); // Keep incomplete line

                for (const line of lines) {
                    if (line.startsWith("data: ")) {
                        const jsonStr = line.slice(6);
                        if (jsonStr === "[DONE]") break;
                        
                        try {
                            const data = JSON.parse(jsonStr);
                            const token = data.choices?.[0]?.delta?.content || "";
                            fullContent += token;
                            
                            // Update DOM
                            const contentDiv = msgDom.querySelector('.whitespace-pre-wrap');
                            if (contentDiv) contentDiv.innerText = fullContent;
                            const metricsDiv = msgDom.querySelector('.font-mono');

if (metricsDiv) {
    metricsDiv.innerHTML = `
        <span>${model}</span>
        <span>${latency}ms</span>
        <span>${fullContent.length} chars</span>
    `;
}
                           const latency = Date.now() - start;
                          // Auto scroll
                            const container = document.getElementById("chatMessages");
                            container.scrollTop = container.scrollHeight;
                        } catch(e) { /* ignore parsing errors in stream */ }
                    }
                }
            }

            // 4. Finalize
            const latency = Date.now() - start;
            aiMsgObj.content = fullContent;
            aiMsgObj.metadata.latency = latency;
            
            // Save to history
            proj.messages.push(aiMsgObj);
            saveDB();
            
            // Check for Artefacts (Code Blocks)
            parseAndAddArtefacts(fullContent, proj);

        } catch (e) {
            alert("Error: " + e.message);
            proj.messages.push({ role: 'assistant', content: "Error: " + e.message });
            saveDB();
        } finally {
            document.getElementById("sendBtn").disabled = false;
            document.getElementById("sendBtn").innerHTML = '<i class="fa-solid fa-paper-plane"></i>';
        }
    }

if (metricsDiv) {

}
    function parseAndAddArtefacts(text, project) {
        const codeBlockRegex = /```(\w+)?\n([\s\S]*?)```/g;
        let match;
        while ((match = codeBlockRegex.exec(text)) !== null) {
            const lang = match[1] || 'code';
            const code = match[2].trim();
            // Add to project artefacts
            project.artefacts = project.artefacts || [];
            project.artefacts.unshift({ type: "code", content: code, lang: lang });
            saveDB();
        }
        renderArtefacts();
    }

    // --- FILE LOGIC ---
    document.getElementById("zipInput").addEventListener("change", async e => {
        const file = e.target.files[0];
        if (!file) return;
        const zip = await JSZip.loadAsync(file);
        const proj = getActiveProject();
        if(!proj) return;

        proj.files = {}; // Clear current files in project
        
        for (const name in zip.files) {
            if (zip.files[name].dir) continue;
            proj.files[name] = await zip.files[name].async("string");
        }
        
        saveDB();
        renderFileList();
        switchMainTab(0); // Go to editor
        e.target.value = '';
    });

    function renderFileList() {
    const proj = getActiveProject();
    const count = proj ? Object.keys(proj.files).length : 0;

    document.getElementById("fileCount").textContent = `${count} files`;

    ["fileList", "drawerFileList"].forEach(id => {

        const el = document.getElementById(id);
        el.innerHTML = "";

        if (!proj) return;

        Object.keys(proj.files).forEach(name => {

            const btn = document.createElement("button");

            btn.className =
                `w-full px-4 py-3 text-left hover:bg-slate-800 active:bg-slate-700 flex items-center gap-3 text-sm truncate ${
                    currentFile === name
                        ? 'bg-slate-800 text-cyan-400'
                        : ''
                }`;

            btn.innerHTML =
                `<i class="fa-solid fa-file-code w-4 text-center opacity-60"></i>
                 <span class="truncate">${name.split('/').pop()}</span>`;

            btn.onclick = () => {

                currentFile = name;

                editor.setValue(proj.files[name]);

                monaco.editor.setModelLanguage(
                    editor.getModel(),
                    getLang(name)
                );

                if (window.innerWidth < 1024) {
                    toggleFilePanel();
                }

                renderFileList();
            };

            el.appendChild(btn);
        });
    });
}

    function renderArtefacts() {
        const container = document.getElementById("artefactsContainer");
        const proj = getActiveProject();
        const items = (proj && proj.artefacts) ? proj.artefacts : [];
        
        container.innerHTML = items.length === 0 ? `<p class="text-center text-slate-500 py-20">No artefacts yet.</p>` : "";
        
        items.forEach((a, i) => {
             if(a.type === 'code') {
                 const div = document.createElement('div');
                 div.className = "bg-slate-900 rounded-xl p-2";
                 div.innerHTML = `<div class="text-xs text-cyan-400 mb-1">Artefact: ${a.lang}</div><pre class="text-xs overflow-auto max-h-40">${escapeHtml(a.content)}</pre>`;
                 container.appendChild(div);
             }
        });
    }

    // --- HELPERS ---
    function escapeHtml(text) {
      return String(text).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;");
    }

    function getLang(filename) {
      if (filename.endsWith('.html')) return 'html';
      if (filename.endsWith('.css')) return 'css';
      if (filename.endsWith('.json')) return 'json';
      return 'javascript';
    }

    function triggerImageUpload() { document.getElementById("imageInput").click(); }
    
    document.getElementById("imageInput").addEventListener("change", e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        attachedImage = ev.target.result;
        document.getElementById("previewImg").src = attachedImage;
        document.getElementById("imagePreview").classList.remove("hidden");
      };
      reader.readAsDataURL(file);
      e.target.value = '';
    });

   window.removeImage = function() {
      attachedImage = null;
      document.getElementById("imagePreview").classList.add("hidden");
    }
    
    function startVoiceInput() {
      const Speech = window.SpeechRecognition || window.webkitSpeechRecognition;
      if (!Speech) return alert("Voice not supported");
      const rec = new Speech();
      rec.lang = "en-US";
      rec.onresult = e => document.getElementById("promptInput").value = e.results[0][0].transcript;
      rec.start();
    }

    // --- UI CONTROLS ---

    window.switchMainTab =function(tab) {
      currentMainTab = tab;
      const editorPanel = document.getElementById("panel-editor");
      const chatPanel = document.getElementById("panel-chat");
      
      if (window.innerWidth >= 1024) {
        editorPanel.classList.remove('hidden');
        chatPanel.classList.remove('hidden');
      } else {
        editorPanel.classList.toggle('hidden', tab !== 0);
        chatPanel.classList.toggle('hidden', tab === 0);
        if (tab === 2) { switchChatTab(1); chatPanel.classList.remove('hidden'); } 
        else if (tab === 1) { switchChatTab(0); chatPanel.classList.remove('hidden'); }
      }

      for (let i = 0; i < 3; i++) {
        const el = document.getElementById(`mainTab${i}`);
        if (el) el.classList.toggle("tab-active", i === tab);
      }
    }

    function switchChatTab(tab) {
      document.getElementById("chatView").classList.toggle("hidden", tab !== 0);
      document.getElementById("artefactsView").classList.toggle("hidden", tab !== 1);
    }

   window.toggleFilePanel = function() {
      document.getElementById("fileDrawer").classList.toggle("hidden");
    }
    
    function closeDropdowns() {
        document.getElementById('projectDropdown').classList.remove('show');
    }

    // --- EVENT LISTENERS ---
    
    document.getElementById("projectToggle").onclick = (e) => {
        e.stopPropagation();
        document.getElementById('projectDropdown').classList.toggle('show');
    };
    
    document.addEventListener('click', closeDropdowns);

    document.getElementById("indexBtn").onclick = () => {
      const proj = getActiveProject(); // Or however you access your project state
      if(!proj) return;
      
      let ctx = "";
      const entries = Object.entries(proj.files);
      if (entries.length === 0) return alert("No files to index. Upload a ZIP.");
      
      // CHANGED: Slicing to 30000 chars per file so AI sees the whole code
      entries.slice(0, 40).forEach(([n, c]) => ctx += `FILE: ${n}\n${c.slice(0, 30000)}\n---\n`);
      
      proj.context = ctx;
      saveDB(); // Save context to project
      appendMessageDOM(
        "assistant",
        `Indexed ${entries.length} files. I can now see the full content.`
       );
    };

    document.getElementById("exportZipBtn").onclick = async () => {
      const proj = getActiveProject();
      if (!proj) return;
      
      const zip = new JSZip();
      Object.entries(proj.files).forEach(([n, c]) => zip.file(n, c));
      const blob = await zip.generateAsync({ type: "blob" });
      const a = document.createElement("a");
      a.href = URL.createObjectURL(blob);
      a.download = `${proj.name}.zip`;
      a.click();
    };

    document.getElementById("settingsBtn").onclick = () => document.getElementById("settingsModal").classList.remove("hidden");
    document.getElementById("saveSettingsBtn").onclick = () => {
      localStorage.setItem("mimo_api_key", document.getElementById("apiKeyInput").value.trim());
      document.getElementById("settingsModal").classList.add("hidden");
    };

    const txt = document.getElementById("promptInput");
    txt.addEventListener("input", () => {
      txt.style.height = 'auto';
      txt.style.height = (txt.scrollHeight) + 'px';
    });
    txt.addEventListener("keydown", e => {
      if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendChat(); }
    });
    document.getElementById("sendBtn").onclick = sendChat;

    // INIT
    function initApp() {
        loadDB();
        switchProject(db.activeId);
        renderProjectDropdown();
        
        if (localStorage.getItem("mimo_api_key")) {
            document.getElementById("apiKeyInput").value = localStorage.getItem("mimo_api_key");
        }
        
        if (window.innerWidth < 1024) switchMainTab(1); // Start on Chat for mobile
        console.log("Mimo Ready.");
    }


  </script>
